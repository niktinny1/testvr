<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieszkanie VR - Skala 1:1 (Realne Wymiary)</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene background="color: #E5E5E5">
        
        <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.4" position="-2 4 2"></a-light>

        <a-entity id="rig" movement-controls="speed: 0.15" position="-1.5 0 -1">
            <a-entity camera position="0 1.6 0" look-controls></a-entity>
            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity oculus-touch-controls="hand: right"></a-entity>
        </a-entity>

        <a-plane position="0 0 0" rotation="-90 0 0" width="12" height="12" color="#F5F5F5"></a-plane>

        <a-box position="0 1.35 -5" width="10" height="2.7" depth="0.2" color="#FFFFFF"></a-box> <a-box position="0 1.35 5" width="10" height="2.7" depth="0.2" color="#FFFFFF"></a-box>  <a-box position="-5 1.35 0" width="0.2" height="2.7" depth="10" color="#FFFFFF"></a-box> <a-box position="5 1.35 0" width="0.2" height="2.7" depth="10" color="#FFFFFF"></a-box>  <a-box position="-1.5 1.35 -2" width="0.2" height="2.7" depth="6" color="#F0F0F0"></a-box> <a-box position="1 1.35 -2.5" width="5" height="2.7" depth="0.2" color="#F0F0F0"></a-box> <a-box position="-4.9 1 0" width="0.3" height="2" depth="0.8" color="#008000"></a-box>
        <a-box position="-2.5 1 -2.5" width="0.8" height="2" depth="0.05" color="#008000" rotation="0 90 0"></a-box>
        <a-box position="-0.5 1 -2.5" width="0.8" height="2" depth="0.05" color="#008000" rotation="0 90 0"></a-box>
        <a-box position="-2.5 1 1" width="0.8" height="2" depth="0.05" color="#008000" rotation="0 90 0"></a-box>

        <a-box position="4.9 1.5 -3" width="0.3" height="1.5" depth="1.6" color="#D3D3D3" opacity="0.6"></a-box> <a-box position="4.9 1.5 2" width="0.3" height="2.2" depth="2.2" color="#D3D3D3" opacity="0.6"></a-box> <a-box position="-1 1.5 4.9" width="1.6" height="1.5" depth="0.3" color="#D3D3D3" opacity="0.6"></a-box> <a-box position="-3 1.25 -0.5" width="0.6" height="2.5" depth="1.2" color="#FFD700"></a-box>
        <a-box position="-1.8 1.25 -4.5" width="0.6" height="2.5" depth="0.8" color="#FFD700"></a-box>
        <a-box position="-4.5 1.25 1" width="0.6" height="2.5" depth="1.2" color="#FFD700"></a-box>

        <a-box position="2 0.45 -4" width="2" height="0.9" depth="1.6" color="#D2B48C"></a-box>
        <a-box position="1 0.45 -3" width="0.4" height="0.9" depth="0.4" color="#D2B48C"></a-box>
        <a-box position="3 0.45 -3" width="0.4" height="0.9" depth="0.4" color="#D2B48C"></a-box>
        <a-box position="-4 0.45 3.5" width="1.2" height="0.9" depth="2" color="#D2B48C"></a-box>
        <a-box position="-2.5 0.45 4.5" width="1.2" height="0.9" depth="0.6" color="#D2B48C"></a-box>
        <a-box position="1 0.45 4.5" width="2" height="0.9" depth="0.4" color="#D2B48C"></a-box>
        <a-box position="2 0.45 3" width="2" height="0.9" depth="1" color="#D2B48C"></a-box> <a-box position="1.5 0.45 2" width="1" height="0.9" depth="0.6" color="#D2B48C"></a-box> <a-box position="2 0.45 -0.5" width="3.5" height="0.9" depth="0.6" color="#D2B48C"></a-box>

        <a-box position="2 0.375 1" width="1.2" height="0.75" depth="0.8" color="#8B4513"></a-box>
        <a-box position="1.2 0.375 1" width="0.4" height="0.75" depth="0.4" color="#8B4513"></a-box>
        <a-box position="2.8 0.375 1" width="0.4" height="0.75" depth="0.4" color="#8B4513"></a-box>
        <a-box position="2 0.375 0.4" width="0.4" height="0.75" depth="0.4" color="#8B4513"></a-box>
        <a-box position="2 0.375 1.6" width="0.4" height="0.75" depth="0.4" color="#8B4513"></a-box>

        <a-box position="-4 0.3 -4.5" width="0.8" height="0.6" depth="1.6" color="#00BFFF"></a-box> <a-box position="-3 0.45 -3.5" width="0.5" height="0.9" depth="0.5" color="#00BFFF"></a-box> <a-box position="-4.5 0.45 -3" width="0.4" height="0.9" depth="0.6" color="#00BFFF"></a-box> <a-box position="1.5 0.46 -0.5" width="0.8" height="0.9" depth="0.6" color="#00BFFF"></a-box> <a-box position="3.2 0.46 -0.5" width="0.6" height="0.9" depth="0.6" color="#00BFFF"></a-box> </a-scene>
</body>
</html>
