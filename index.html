<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mieszkanie VR - Skala 1:1</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene background="color: #87CEEB">
        
        <a-light type="ambient" color="#fff" intensity="0.6"></a-light>
        <a-light type="directional" color="#fff" intensity="0.4" position="-1 2 1"></a-light>

        <a-entity id="rig" movement-controls="speed: 0.15" position="3.5 0 -1.5">
            <a-entity camera position="0 1.6 0" look-controls></a-entity>
            <a-entity oculus-touch-controls="hand: left"></a-entity>
            <a-entity oculus-touch-controls="hand: right"></a-entity>
        </a-entity>

        <a-plane position="0 0 0" rotation="-90 0 0" width="8" height="7" color="#D2B48C"></a-plane>

        <a-plane position="-4.8 0 0.5" rotation="-90 0 0" width="1.6" height="6" color="#808080"></a-plane>
        <a-text value="BALKON\n14,62 m2" position="-4.8 1.5 0.5" rotation="0 90 0" align="center" color="#000"></a-text>

        <a-box position="0 1.35 -3.5" width="8" height="2.7" depth="0.1" color="#F5F5DC"></a-box> <a-box position="0 1.35 3.5" width="8" height="2.7" depth="0.1" color="#F5F5DC"></a-box>  <a-box position="4 1.35 0" width="0.1" height="2.7" depth="7" color="#F5F5DC"></a-box>   <a-box position="-4 1.35 0" width="0.1" height="2.7" depth="7" color="#add8e6" opacity="0.5"></a-box> <a-box position="-2.25 1.35 -0.2" width="3.5" height="2.7" depth="0.1" color="#E0E0E0"></a-box> <a-text value="SYPIALNIA\n11,50 m2" position="-2.25 1.5 -1.8" rotation="0 0 0" align="center" color="#000"></a-text>

        <a-box position="0.5 1.35 -1.2" width="0.1" height="2.7" depth="2.1" color="#E0E0E0"></a-box> <a-box position="1.65 1.35 -0.2" width="2.3" height="2.7" depth="0.1" color="#E0E0E0"></a-box> <a-text value="LAZIENKA\n4,63 m2" position="1.65 1.5 -1.8" rotation="0 0 0" align="center" color="#000"></a-text>

        <a-box position="2.8 1.35 -0.2" width="0.1" height="2.7" depth="2.3" color="#E0E0E0"></a-box> <a-text value="HALL\n5,25 m2" position="3.4 1.5 -1.8" rotation="0 -90 0" align="center" color="#000"></a-text>

        <a-box position="3.95 1 -1.5" width="0.15" height="2" depth="1" color="#654321"></a-box>

        <a-text value="SALON Z ANEKSEM\n25,60 m2" position="0 1.5 1.5" rotation="0 0 0" align="center" color="#000"></a-text>
        
        <a-box position="2.5 0.45 2" width="1.5" height="0.9" depth="1" color="#FFFFFF"></a-box>
        <a-box position="-1 0.3 2" width="2.5" height="0.6" depth="1" color="#555555"></a-box>

    </a-scene>
</body>
</html>
